name: API GCP Infra

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    name: Apply API infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/gcp-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_github_repository: ${{ github.repository }}
          TF_VAR_entra_client_id: ${{ vars.GCP_ENTRA_CLIENT_ID }}
          TF_VAR_entra_tenant_id: ${{ vars.GCP_ENTRA_TENANT_ID }}
          TF_VAR_session_secret: ${{ secrets.GCP_SESSION_SECRET }}
        run: terraform apply -auto-approve
