name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/API/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  APP_NAME: finance-companion
  AZURE_RESOURCE_GROUP: rg-finance-companion-dev
  COSMOS_TABLE_NAME: finance
  API_PATH: src/API

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate API Dockerfile
        run: test -f "${API_PATH}/Dockerfile"

      - name: Set image name
        run: |
          REPOSITORY="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${REPOSITORY}/api:${{ github.sha }}" >> "${GITHUB_ENV}"

      - name: Login to GHCR for push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "${IMAGE_NAME}" "${API_PATH}"

      - name: Push image
        run: docker push "${IMAGE_NAME}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resources
        uses: azure/cli@v2
        with:
          inlineScript: |
            API_CONTAINER_APP_NAME="$(az containerapp list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}' && contains(name, '-api-')].name | [0]" \
              --output tsv \
              --only-show-errors)"

            COSMOS_ACCOUNT_NAME="$(az cosmosdb list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}'].name | [0]" \
              --output tsv \
              --only-show-errors)"

            if [ -z "${API_CONTAINER_APP_NAME}" ]; then
              echo "No API Container App found in ${AZURE_RESOURCE_GROUP} for app tag ${APP_NAME}." >&2
              exit 1
            fi

            if [ -z "${COSMOS_ACCOUNT_NAME}" ]; then
              echo "No Cosmos DB account found in ${AZURE_RESOURCE_GROUP} for app tag ${APP_NAME}." >&2
              exit 1
            fi

            echo "API_CONTAINER_APP_NAME=${API_CONTAINER_APP_NAME}" >> "${GITHUB_ENV}"
            echo "COSMOS_ACCOUNT_NAME=${COSMOS_ACCOUNT_NAME}" >> "${GITHUB_ENV}"

      - name: Configure Container App registry
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name "${API_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --server ghcr.io \
              --username "${{ secrets.GHCR_USERNAME }}" \
              --password "${{ secrets.GHCR_READ_TOKEN }}" \
              --only-show-errors

      - name: Configure API secrets
        uses: azure/cli@v2
        with:
          inlineScript: |
            COSMOS_TABLE_CONNECTION_STRING="$(az cosmosdb keys list \
              --name "${COSMOS_ACCOUNT_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --type connection-strings \
              --query 'connectionStrings[0].connectionString' \
              --output tsv)"

            az containerapp secret set \
              --name "${API_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --secrets cosmos-table-connection-string="${COSMOS_TABLE_CONNECTION_STRING}" \
              --only-show-errors

      - name: Deploy API image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${API_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE_NAME}" \
              --set-env-vars \
                COSMOS_TABLE_CONNECTION_STRING=secretref:cosmos-table-connection-string \
                COSMOS_TABLE_NAME="${COSMOS_TABLE_NAME}" \
              --only-show-errors
