name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/API/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  API_PATH: src/API

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate API Dockerfile
        run: test -f "${API_PATH}/Dockerfile"

      - name: Set image name
        run: |
          REPOSITORY="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${REPOSITORY}/api:${{ github.sha }}" >> "${GITHUB_ENV}"

      - name: Login to GHCR for push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "${IMAGE_NAME}" "${API_PATH}"

      - name: Push image
        run: docker push "${IMAGE_NAME}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Container App registry
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name "${{ vars.API_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --server ghcr.io \
              --username "${{ secrets.GHCR_USERNAME }}" \
              --password "${{ secrets.GHCR_READ_TOKEN }}" \
              --only-show-errors

      - name: Configure API secrets
        uses: azure/cli@v2
        with:
          inlineScript: |
            COSMOS_TABLE_CONNECTION_STRING="$(az cosmosdb keys list \
              --name "${{ vars.COSMOS_ACCOUNT_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --type connection-strings \
              --query 'connectionStrings[0].connectionString' \
              --output tsv)"

            az containerapp secret set \
              --name "${{ vars.API_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --secrets cosmos-table-connection-string="${COSMOS_TABLE_CONNECTION_STRING}" \
              --only-show-errors

      - name: Deploy API image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ vars.API_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${IMAGE_NAME}" \
              --set-env-vars \
                COSMOS_TABLE_CONNECTION_STRING=secretref:cosmos-table-connection-string \
                COSMOS_TABLE_NAME="${{ vars.COSMOS_TABLE_NAME }}" \
              --only-show-errors
