name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/API/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  APP_NAME: finance-companion
  AZURE_RESOURCE_GROUP: rg-finance-companion
  COSMOS_TABLE_NAME: finance
  API_PATH: src/API

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    environment: deployment
    concurrency:
      group: backend-deployment
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate API Dockerfile
        run: test -f "${API_PATH}/Dockerfile"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resources
        uses: azure/cli@v2
        with:
          inlineScript: |
            API_CONTAINER_APP_NAME="$(az containerapp list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}' && contains(name, '-api-')].name | [0]" \
              --output tsv \
              --only-show-errors)"

            COSMOS_ACCOUNT_NAME="$(az cosmosdb list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}'].name | [0]" \
              --output tsv \
              --only-show-errors)"

            ACR_NAME="$(az acr list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}'].name | [0]" \
              --output tsv \
              --only-show-errors)"

            ACR_LOGIN_SERVER="$(az acr list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}'].loginServer | [0]" \
              --output tsv \
              --only-show-errors)"

            if [ -z "${API_CONTAINER_APP_NAME}" ]; then
              echo "No API Container App found." >&2
              exit 1
            fi
            if [ -z "${COSMOS_ACCOUNT_NAME}" ]; then
              echo "No Cosmos DB account found." >&2
              exit 1
            fi
            if [ -z "${ACR_NAME}" ]; then
              echo "No ACR registry found." >&2
              exit 1
            fi

            echo "API_CONTAINER_APP_NAME=${API_CONTAINER_APP_NAME}" >> "${GITHUB_ENV}"
            echo "COSMOS_ACCOUNT_NAME=${COSMOS_ACCOUNT_NAME}" >> "${GITHUB_ENV}"
            echo "ACR_NAME=${ACR_NAME}" >> "${GITHUB_ENV}"
            echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "${GITHUB_ENV}"

      - name: Set image name
        run: |
          echo "IMAGE_NAME=${{ env.ACR_LOGIN_SERVER }}/api:${{ github.sha }}" >> "${GITHUB_ENV}"

      - name: Login to ACR
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr login --name "${{ env.ACR_NAME }}"

      - name: Build image
        run: docker build -t "${IMAGE_NAME}" "${API_PATH}"

      - name: Push image
        run: docker push "${IMAGE_NAME}"

      - name: Configure API secrets
        uses: azure/cli@v2
        with:
          inlineScript: |
            COSMOS_TABLE_CONNECTION_STRING="$(az cosmosdb keys list \
              --name "${COSMOS_ACCOUNT_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --type connection-strings \
              --query 'connectionStrings[0].connectionString' \
              --output tsv)"

            az containerapp secret set \
              --name "${API_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --secrets \
                cosmos-table-connection-string="${COSMOS_TABLE_CONNECTION_STRING}" \
                session-secret="${{ secrets.ENV_PROD_SESSION_SECRET }}" \
              --only-show-errors

      - name: Deploy API image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${API_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE_NAME}" \
              --set-env-vars \
                FINANCE_COMPANION_COSMOS_TABLE_CONNECTION_STRING=secretref:cosmos-table-connection-string \
                FINANCE_COMPANION_COSMOS_TABLE_NAME="${COSMOS_TABLE_NAME}" \
                FINANCE_COMPANION_SESSION_SECRET=secretref:session-secret \
                FINANCE_COMPANION_ENTRA_CLIENT_ID="${{ vars.ENV_PROD_ENTRA_CLIENT_ID }}" \
                FINANCE_COMPANION_ENTRA_TENANT_ID="${{ vars.ENV_PROD_ENTRA_TENANT_ID }}" \
                FINANCE_COMPANION_ALLOWED_EMAIL="${{ vars.ENV_PROD_ALLOWED_EMAIL }}" \
                FINANCE_COMPANION_ENVIRONMENT="production" \
              --only-show-errors
