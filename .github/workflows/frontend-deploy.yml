name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/UI/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: finance-companion
  AZURE_RESOURCE_GROUP: rg-finance-companion

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    environment: deployment
    concurrency:
      group: frontend-deployment
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/UI/package-lock.json

      - name: Install
        working-directory: src/UI
        run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resources
        id: resolve_resources
        uses: azure/cli@v2
        with:
          inlineScript: |
            STATIC_WEB_APP_NAME="$(az staticwebapp list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}'].name | [0]" \
              --output tsv \
              --only-show-errors)"

            if [ -z "${STATIC_WEB_APP_NAME}" ]; then
              echo "No Static Web App found in ${AZURE_RESOURCE_GROUP}." >&2
              exit 1
            fi

            DEPLOYMENT_TOKEN="$(az staticwebapp secrets list \
              --name "${STATIC_WEB_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query properties.apiKey \
              --output tsv \
              --only-show-errors)"

            echo "::add-mask::${DEPLOYMENT_TOKEN}"
            echo "deployment_token=${DEPLOYMENT_TOKEN}" >> "${GITHUB_OUTPUT}"

            SWA_HOSTNAME="$(az staticwebapp show \
              --name "${STATIC_WEB_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "defaultHostname" \
              --output tsv \
              --only-show-errors)"
            echo "VITE_ENTRA_REDIRECT_URI=https://${SWA_HOSTNAME}" >> "${GITHUB_ENV}"

            API_CONTAINER_APP_NAME="$(az containerapp list \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "[?tags.app=='${APP_NAME}' && contains(name, '-api-')].name | [0]" \
              --output tsv \
              --only-show-errors)"

            if [ -n "${API_CONTAINER_APP_NAME}" ]; then
              API_FQDN="$(az containerapp show \
                --name "${API_CONTAINER_APP_NAME}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.configuration.ingress.fqdn" \
                --output tsv \
                --only-show-errors)"
              echo "VITE_API_BASE_URL=https://${API_FQDN}/api/v1" >> "${GITHUB_ENV}"
            fi

      - name: Build
        working-directory: src/UI
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_ENTRA_CLIENT_ID: ${{ vars.ENV_PROD_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ vars.ENV_PROD_ENTRA_TENANT_ID }}
          VITE_ENTRA_REDIRECT_URI: ${{ env.VITE_ENTRA_REDIRECT_URI }}
        run: npm run build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.resolve_resources.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/UI/dist
          skip_app_build: true
